<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Breakfast Times">
  <defs>
    <clipPath id="seal"><circle cx="60" cy="60" r="50"/></clipPath>
  </defs>
  <!-- newspaper-text imprint behind the sun — bold mottled greys, legible even small -->
  <g clip-path="url(#seal)" font-family="'Courier New',Courier,monospace" font-weight="700" font-size="5.4" letter-spacing="-0.1">
    <text x="8" y="18" fill="#2c2823" opacity="0.82">THE BREAKFAST TIMES</text>
    <text x="8" y="26" fill="#574f46" opacity="0.55">morning edition · no.1</text>
    <text x="8" y="34" fill="#2c2823" opacity="0.78">good news from around</text>
    <text x="8" y="42" fill="#4a433b" opacity="0.62">the world &amp; two short</text>
    <text x="8" y="50" fill="#2c2823" opacity="0.72">stories with your coffee</text>
    <text x="8" y="92" fill="#574f46" opacity="0.58">all the good that is fit</text>
    <text x="8" y="100" fill="#2c2823" opacity="0.80">stay hydrated · be early</text>
    <text x="8" y="108" fill="#4a433b" opacity="0.60">good news · good stories</text>
  </g>
  <!-- seal -->
  <circle cx="60" cy="60" r="55" fill="none" stroke="#db5a3c" stroke-width="2.4"/>
  <circle cx="60" cy="60" r="50" fill="none" stroke="#eaa42e" stroke-width="1"/>
  <!-- rays -->
  <g stroke="#eaa42e" stroke-width="2.8" stroke-linecap="round">
    <line x1="60" y1="48" x2="60" y2="40"/>
    <line x1="73.0" y1="51.5" x2="76.5" y2="45.4"/>
    <line x1="47.0" y1="51.5" x2="43.5" y2="45.4"/>
    <line x1="82.5" y1="61.0" x2="88.6" y2="57.5"/>
    <line x1="37.5" y1="61.0" x2="31.4" y2="57.5"/>
  </g>
  <!-- sun -->
  <path d="M40 74 a20 20 0 0 1 40 0 Z" fill="#db5a3c"/>
  <!-- horizon -->
  <line x1="26" y1="74" x2="94" y2="74" stroke="#db5a3c" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="30" y1="80" x2="90" y2="80" stroke="#eaa42e" stroke-width="1.5" stroke-linecap="round"/>
</svg>
