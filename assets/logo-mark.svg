<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Breakfast Times">
  <defs>
    <clipPath id="seal"><circle cx="60" cy="60" r="50"/></clipPath>
  </defs>
  <!-- faint newspaper-text imprint behind the sun (typewriter, watercolour greys) -->
  <g clip-path="url(#seal)" font-family="'Courier New',Courier,monospace" font-size="3.5" letter-spacing="0.1">
    <text x="9" y="15" fill="#5a5550" opacity="0.26">THE BREAKFAST TIMES · No.1</text>
    <text x="9" y="22" fill="#8c857d" opacity="0.13">morning edition — good news</text>
    <text x="9" y="29" fill="#4f4a45" opacity="0.30">from around the world, and</text>
    <text x="9" y="36" fill="#9a938b" opacity="0.12">two short stories to read with</text>
    <text x="9" y="43" fill="#6b655d" opacity="0.22">your coffee. all the good that</text>
    <text x="9" y="50" fill="#56514b" opacity="0.28">is fit to print. est. mmxxvi.</text>
    <text x="9" y="57" fill="#9a938b" opacity="0.11">weather: fair. outlook: kind.</text>
    <text x="9" y="86" fill="#8c857d" opacity="0.14">a small good thing, daily —</text>
    <text x="9" y="93" fill="#4f4a45" opacity="0.27">stay hydrated. be early. begin.</text>
    <text x="9" y="100" fill="#7a746c" opacity="0.16">fresh every single morning ——</text>
    <text x="9" y="107" fill="#56514b" opacity="0.24">good news. good stories. daily.</text>
  </g>
  <!-- seal -->
  <circle cx="60" cy="60" r="55" fill="none" stroke="#8e2740" stroke-width="2.2"/>
  <circle cx="60" cy="60" r="50" fill="none" stroke="#b8945f" stroke-width="1"/>
  <!-- rays -->
  <g stroke="#b8945f" stroke-width="2.6" stroke-linecap="round">
    <line x1="60" y1="48" x2="60" y2="40"/>
    <line x1="73.0" y1="51.5" x2="76.5" y2="45.4"/>
    <line x1="47.0" y1="51.5" x2="43.5" y2="45.4"/>
    <line x1="82.5" y1="61.0" x2="88.6" y2="57.5"/>
    <line x1="37.5" y1="61.0" x2="31.4" y2="57.5"/>
  </g>
  <!-- sun -->
  <path d="M40 74 a20 20 0 0 1 40 0 Z" fill="#8e2740"/>
  <!-- horizon -->
  <line x1="26" y1="74" x2="94" y2="74" stroke="#8e2740" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="30" y1="80" x2="90" y2="80" stroke="#b8945f" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>
</svg>
